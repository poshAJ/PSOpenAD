services:
  dotnet:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    network_mode: service:samba

  samba:
    image: quay.io/smblds/smblds:latest
    restart: unless-stopped
    hostname: dc.psopenad.local
    environment:
      REALM: PSOPENAD.LOCAL
      DOMAIN: PSOPENAD
      ADMINPASS: P@ssw0rd
      SERVER_SERVICES: rpc kdc dns dnsupdate ldap cldap
